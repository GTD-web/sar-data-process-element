name: CI

on:
  push:
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: quay.io/tembo/pgmq-pg:latest
        env:
          POSTGRES_USER: sdpe
          POSTGRES_PASSWORD: sdpe
          POSTGRES_DB: sdpe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sdpe"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Init test database
        run: psql -f deploy/local/init/01-init.sql
        env:
          PGHOST: localhost
          PGUSER: sdpe
          PGPASSWORD: sdpe
          PGDATABASE: sdpe
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      - run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://sdpe:sdpe@localhost:5432/sdpe

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Ruff and mypy (SDPE-CDS-001 §4.4)
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy
          python -m ruff check algorithms
          python -m ruff format algorithms --check
          python -m mypy algorithms/csc03_range_compression
