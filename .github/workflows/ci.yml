name: CI

on:
  push:
    paths-ignore:
      - 'reports/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  typescript:
    runs-on: ubuntu-latest
    outputs:
      build-result: ${{ steps.build.outcome }}
      lint-result: ${{ steps.lint.outcome }}
      test-result: ${{ steps.test.outcome }}
      e2e-result: ${{ steps.e2e.outcome }}
    services:
      postgres:
        image: quay.io/tembo/pgmq-pg:latest
        env:
          POSTGRES_USER: sdpe
          POSTGRES_PASSWORD: sdpe
          POSTGRES_DB: sdpe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sdpe"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Init test database
        run: psql -f deploy/local/init/01-init.sql
        env:
          PGHOST: localhost
          PGUSER: sdpe
          PGPASSWORD: sdpe
          PGDATABASE: sdpe
      - run: npm ci
      - run: mkdir -p ci-results

      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ci-results/build-output.txt

      - name: Lint
        id: lint
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee ci-results/lint-output.txt

      - name: Unit Test
        id: test
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npx jest --json --outputFile=ci-results/test-unit.json 2>&1 | tee ci-results/test-output.txt

      - name: E2E Test
        id: e2e
        if: always()
        continue-on-error: true
        shell: bash
        env:
          DATABASE_URL: postgresql://sdpe:sdpe@localhost:5432/sdpe
        run: |
          set -o pipefail
          npx jest --config ./apps/pipeline-workflow-subsystem/test/jest-e2e.json --json --outputFile=ci-results/test-e2e.json 2>&1 | tee ci-results/test-e2e-output.txt

      - name: Upload CI results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results-typescript
          path: ci-results/
          retention-days: 7

      - name: Check results
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" = "failure" ] || \
             [ "${{ steps.lint.outcome }}" = "failure" ] || \
             [ "${{ steps.test.outcome }}" = "failure" ] || \
             [ "${{ steps.e2e.outcome }}" = "failure" ]; then
            echo "One or more steps failed."
            exit 1
          fi

  python:
    runs-on: ubuntu-latest
    outputs:
      ruff-check-result: ${{ steps.ruff-check.outcome }}
      ruff-format-result: ${{ steps.ruff-format.outcome }}
      mypy-result: ${{ steps.mypy.outcome }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy
      - run: mkdir -p ci-results

      - name: Ruff check
        id: ruff-check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check algorithms 2>&1 | tee ci-results/python-output.txt

      - name: Ruff format check
        id: ruff-format
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m ruff format algorithms --check 2>&1 | tee -a ci-results/python-output.txt

      - name: Mypy
        id: mypy
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m mypy algorithms/csc03_range_compression 2>&1 | tee -a ci-results/python-output.txt

      - name: Upload CI results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results-python
          path: ci-results/
          retention-days: 7

      - name: Check results
        if: always()
        run: |
          if [ "${{ steps.ruff-check.outcome }}" = "failure" ] || \
             [ "${{ steps.ruff-format.outcome }}" = "failure" ] || \
             [ "${{ steps.mypy.outcome }}" = "failure" ]; then
            echo "One or more Python steps failed."
            exit 1
          fi

  report:
    runs-on: ubuntu-latest
    needs: [typescript, python]
    if: always() && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download TypeScript CI results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-results-typescript
          path: ci-results/

      - name: Download Python CI results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-results-python
          path: ci-results/

      - name: Generate CI report
        id: report
        env:
          CI_RESULTS_DIR: ci-results
          STEP_BUILD: ${{ needs.typescript.outputs.build-result }}
          STEP_LINT: ${{ needs.typescript.outputs.lint-result }}
          STEP_TEST: ${{ needs.typescript.outputs.test-result }}
          STEP_E2E: ${{ needs.typescript.outputs.e2e-result }}
          STEP_RUFF_CHECK: ${{ needs.python.outputs.ruff-check-result }}
          STEP_RUFF_FORMAT: ${{ needs.python.outputs.ruff-format-result }}
          STEP_MYPY: ${{ needs.python.outputs.mypy-result }}
        run: node scripts/generate-ci-report.mjs

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "docs(report): CI/CD 보고서 추가 (${{ github.sha }})"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Publish Pages
        uses: actions/deploy-pages@v4

      - name: Write job summary
        if: always() && steps.report.outputs.report-path != ''
        env:
          REPORT_PATH: ${{ steps.report.outputs.report-path }}
          REPORT_FILE: ${{ steps.report.outputs.report-filename }}
          REPORT_DATE: ${{ steps.report.outputs.report-date }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          BLOB_URL="https://github.com/${REPO}/blob/${BRANCH}/${REPORT_PATH}"

          # GitHub Pages URL: https://<org>.github.io/<repo>/
          ORG=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          PAGES_URL="https://${ORG}.github.io/${REPO_NAME}/${REPORT_DATE}/${REPORT_FILE}"

          TS_RESULT="${{ needs.typescript.result }}"
          PY_RESULT="${{ needs.python.result }}"
          if [ "$TS_RESULT" = "success" ] && [ "$PY_RESULT" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="ALL PASSED"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILED"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
## ${STATUS_EMOJI} CI/CD 보고서 — ${STATUS_TEXT}

| 항목 | 값 |
|------|-----|
| **커밋** | \`${{ github.sha }}\` |
| **브랜치** | \`${BRANCH}\` |
| **보고서** | \`${REPORT_DATE}/${REPORT_FILE}\` |

### 보고서 링크

- [HTML 보고서 보기](${PAGES_URL})
- [GitHub에서 보기](${BLOB_URL})

### 파이��라인 결과

| 단계 | 결과 |
|------|------|
| Build | \`${{ needs.typescript.outputs.build-result }}\` |
| Lint | \`${{ needs.typescript.outputs.lint-result }}\` |
| Unit Test | \`${{ needs.typescript.outputs.test-result }}\` |
| E2E Test | \`${{ needs.typescript.outputs.e2e-result }}\` |
| Python ruff check | \`${{ needs.python.outputs.ruff-check-result }}\` |
| Python ruff format | \`${{ needs.python.outputs.ruff-format-result }}\` |
| Python mypy | \`${{ needs.python.outputs.mypy-result }}\` |
EOF
